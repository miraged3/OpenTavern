name: Build and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: |
          flutter pub get
          flutter gen-l10n

      - name: Setup Android signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          echo "storeFile=app/upload-keystore.jks" > android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties

      - name: Build Android APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk release/OpenTavern-${{ github.ref_name }}-android.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: release/*.apk

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libblkid-dev liblzma-dev

      - name: Get dependencies
        run: |
          flutter pub get
          flutter gen-l10n

      - name: Build Linux x64
        run: flutter build linux --release --target-platform linux-x64

      - name: Archive Linux x64
        run: |
          mkdir -p release
          cd build/linux/x64/release/bundle
          tar czf ../../../../../release/OpenTavern-${{ github.ref_name }}-linux-x64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: release/*.tar.gz

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libblkid-dev liblzma-dev

      - name: Get dependencies
        run: |
          flutter pub get
          flutter gen-l10n

      - name: Build Linux ARM64
        run: flutter build linux --release --target-platform linux-arm64

      - name: Archive Linux ARM64
        run: |
          mkdir -p release
          cd build/linux/arm64/release/bundle
          tar czf ../../../../../release/OpenTavern-${{ github.ref_name }}-linux-arm64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: release/*.tar.gz

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: |
          flutter pub get
          flutter gen-l10n

      - name: Build Windows x64
        run: flutter build windows --release

      - name: Archive Windows x64
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "release/OpenTavern-${{ github.ref_name }}-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: release/*.zip

  build-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: |
          flutter pub get
          flutter gen-l10n

      - name: Build Windows ARM64
        run: flutter build windows --release

      - name: Archive Windows ARM64
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release
          Compress-Archive -Path "build/windows/arm64/runner/Release/*" -DestinationPath "release/OpenTavern-${{ github.ref_name }}-windows-arm64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: release/*.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: |
          flutter pub get
          flutter gen-l10n

      - name: Build macOS
        run: flutter build macos --release

      - name: Archive macOS
        run: |
          mkdir -p release
          cd build/macos/Build/Products/Release
          zip -r ../../../../../release/OpenTavern-${{ github.ref_name }}-macos.zip OpenTavern.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: release/*.zip

  release:
    needs: [build-android, build-linux-x64, build-linux-arm64, build-windows-x64, build-windows-arm64, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
