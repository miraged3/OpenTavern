name: Build and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  FLUTTER_VERSION: '3.41.7'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: |
          flutter pub get
          flutter gen-l10n

      - name: Setup Android signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          echo "storeFile=app/upload-keystore.jks" > android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties

      - name: Build Android APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk release/OpenTavern-${{ github.ref_name }}-android.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: android
          path: release/*.apk
          archive: false
          if-no-files-found: error

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libblkid-dev liblzma-dev

      - name: Get dependencies
        run: |
          flutter pub get
          flutter gen-l10n

      - name: Build Linux x64
        run: flutter build linux --release --target-platform linux-x64

      - name: Prepare Linux x64 artifact
        run: |
          mkdir -p release/OpenTavern-${{ github.ref_name }}-linux-x64
          cp -a build/linux/x64/release/bundle/. release/OpenTavern-${{ github.ref_name }}-linux-x64/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: OpenTavern-${{ github.ref_name }}-linux-x64-bundle
          path: release/OpenTavern-${{ github.ref_name }}-linux-x64/
          compression-level: 0
          if-no-files-found: error

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        run: |
          git clone --depth 1 --branch "$FLUTTER_VERSION" https://github.com/flutter/flutter.git "$RUNNER_TEMP/flutter"
          echo "FLUTTER_ROOT=$RUNNER_TEMP/flutter" >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"
          git config --global --add safe.directory "$RUNNER_TEMP/flutter"
          "$RUNNER_TEMP/flutter/bin/flutter" --version

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libblkid-dev liblzma-dev

      - name: Get dependencies
        run: |
          flutter pub get
          flutter gen-l10n

      - name: Build Linux ARM64
        run: flutter build linux --release --target-platform linux-arm64

      - name: Prepare Linux ARM64 artifact
        run: |
          mkdir -p release/OpenTavern-${{ github.ref_name }}-linux-arm64
          cp -a build/linux/arm64/release/bundle/. release/OpenTavern-${{ github.ref_name }}-linux-arm64/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: OpenTavern-${{ github.ref_name }}-linux-arm64-bundle
          path: release/OpenTavern-${{ github.ref_name }}-linux-arm64/
          compression-level: 0
          if-no-files-found: error

  build-windows-x64:
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Java x64
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          architecture: x64

      - name: Get dependencies
        run: |
          flutter pub get
          flutter gen-l10n

      - name: Build Windows x64
        run: flutter build windows --release

      - name: Prepare Windows x64 artifact
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "release/OpenTavern-${{ github.ref_name }}-windows-x64"
          Copy-Item -Path "build/windows/x64/runner/Release/*" -Destination "release/OpenTavern-${{ github.ref_name }}-windows-x64" -Recurse -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: OpenTavern-${{ github.ref_name }}-windows-x64-bundle
          path: release/OpenTavern-${{ github.ref_name }}-windows-x64/
          compression-level: 0
          if-no-files-found: error

  build-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        shell: powershell
        run: |
          $flutterRoot = Join-Path $env:RUNNER_TEMP 'flutter'
          git clone --depth 1 --branch $env:FLUTTER_VERSION https://github.com/flutter/flutter.git $flutterRoot
          "FLUTTER_ROOT=$flutterRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          (Join-Path $flutterRoot 'bin') | Out-File -FilePath $env:GITHUB_PATH -Append
          git config --global --add safe.directory $flutterRoot
          & (Join-Path $flutterRoot 'bin/flutter.bat') --version

      - name: Setup Java ARM64
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          architecture: aarch64

      - name: Get dependencies
        run: |
          flutter pub get
          flutter gen-l10n

      - name: Configure Windows ARM64
        run: flutter build windows --release --config-only

      - name: Build Windows ARM64
        shell: powershell
        run: |
          cmake -S windows -B build/windows/arm64 -G "Visual Studio 17 2022" -A ARM64 -DFLUTTER_TARGET_PLATFORM=windows-arm64
          cmake --build build/windows/arm64 --config Release --target INSTALL

      - name: Prepare Windows ARM64 artifact
        shell: powershell
        run: |
          if (!(Test-Path "build/windows/arm64/runner/Release/open_tavern.exe")) {
            Get-ChildItem -Path "build/windows" -Recurse -Filter "open_tavern.exe" | Select-Object -ExpandProperty FullName
            throw "Windows ARM64 build output was not found under build/windows/arm64."
          }
          New-Item -ItemType Directory -Force -Path "release/OpenTavern-${{ github.ref_name }}-windows-arm64"
          Copy-Item -Path "build/windows/arm64/runner/Release/*" -Destination "release/OpenTavern-${{ github.ref_name }}-windows-arm64" -Recurse -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: OpenTavern-${{ github.ref_name }}-windows-arm64-bundle
          path: release/OpenTavern-${{ github.ref_name }}-windows-arm64/
          compression-level: 0
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: |
          flutter pub get
          flutter gen-l10n

      - name: Build macOS
        run: flutter build macos --release

      - name: Prepare macOS artifact
        run: |
          mkdir -p release
          cp -a build/macos/Build/Products/Release/OpenTavern.app release/OpenTavern-${{ github.ref_name }}-macos.app

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: OpenTavern-${{ github.ref_name }}-macos-app
          path: release/OpenTavern-${{ github.ref_name }}-macos.app/
          compression-level: 0
          if-no-files-found: error

  release:
    needs: [build-android, build-linux-x64, build-linux-arm64, build-windows-x64, build-windows-arm64, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
